const Badge = ({ color, children }) => (
  <span style={{
    background: color + "22",
    color: color,
    padding: "2px 8px",
    borderRadius: "4px",
    fontSize: "11px",
    fontWeight: 600,
    letterSpacing: "0.3px",
  }}>{children}</span>
);

const ConfidenceMeter = ({ value, max = 10 }) => (
  <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
    <div style={{ display: "flex", gap: "2px" }}>
      {Array.from({ length: max }, (_, i) => (
        <div key={i} style={{
          width: "6px", height: "14px", borderRadius: "2px",
          background: i < value
            ? value >= 7 ? COLORS.green : value >= 4 ? COLORS.yellow : COLORS.red
            : COLORS.border,
        }} />
      ))}
    </div>
    <span style={{ fontSize: "13px", fontWeight: 700, color: COLORS.white }}>{value}/10</span>
  </div>
);

const DirectionBar = ({ moomoo, system, agree }) => {
  const mAbs = Math.abs(moomoo);
  const sAbs = Math.abs(system);
  const total = mAbs + sAbs || 1;
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: "3px" }}>
      <div style={{ display: "flex", gap: "4px", alignItems: "center", fontSize: "10px", color: COLORS.muted }}>
        <span>moomoo</span>
        <div style={{ flex: 1, height: "6px", borderRadius: "3px", background: COLORS.border, overflow: "hidden", position: "relative" }}>
          <div style={{
            width: `${(mAbs / total) * 100}%`, height: "100%", borderRadius: "3px",
            background: moomoo >= 0 ? COLORS.green : COLORS.red,
          }} />
        </div>
        <span style={{ color: moomoo >= 0 ? COLORS.green : COLORS.red, fontWeight: 600, minWidth: "50px", textAlign: "right" }}>
          {moomoo >= 0 ? "+" : ""}{moomoo.toFixed(1)}M

};
