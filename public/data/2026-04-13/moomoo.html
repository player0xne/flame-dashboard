function Pill({l,v,ch,up}){
  return <div style={{padding:"5px 11px",background:C.card2,borderRadius:8,border:`1px solid ${C.border}`,minWidth:95}}>
    <div style={{fontSize:9,color:C.muted}}>{l}</div>

    <div style={{fontSize:10,fontWeight:600,color:up?C.green:C.red}}>{ch}</div>

}

function CTable({rows}){
  const h=["合约","到期","DTE","方向","主动","金额","V/OI"];
  return <div style={{overflowX:"auto",marginBottom:6}}>
    <table style={{width:"100%",borderCollapse:"collapse",fontSize:10.5}}>
      <thead><tr style={{borderBottom:`1px solid ${C.border}`}}>
        {h.map(x=><th key={x} style={{padding:"3px 5px",color:C.muted,fontWeight:600,textAlign:"left",whiteSpace:"nowrap"}}>{x}</th>)}
      </tr></thead>
      <tbody>{rows.map((c,i)=>{
        const dc=c.dir.includes("🟢")?C.green:c.dir.includes("🔴")?C.red:c.dir.includes("🟡")?C.yellow:C.muted;
        const ac=c.act==="买入"?C.green:c.act==="卖出"?C.red:C.yellow;
        const vf=parseFloat(c.voi);
        return <tr key={i} style={{borderBottom:`1px solid ${C.border}15`}}>
          <td style={{padding:"3px 5px",fontWeight:700}}>{c.s}</td>
          <td style={{padding:"3px 5px",color:C.muted}}>{c.e}</td>
          <td style={{padding:"3px 5px",color:C.muted}}>{c.d}d</td>
          <td style={{padding:"3px 5px",color:dc,fontWeight:600}}>{c.dir}</td>
          <td style={{padding:"3px 5px",color:ac}}>{c.act}</td>
          <td style={{padding:"3px 5px",fontWeight:700}}>{c.vol}</td>
          <td style={{padding:"3px 5px",color:vf>5?C.yellow:C.muted,fontWeight:vf>5?700:400}}>{c.voi}</td>
        </tr>;
      })}</tbody>
    </table>
  </div>;
}

function Card({sym}){
  const t=tickers[sym]; if(!t) return null;
  const sc=t.sig.includes("🟢")?C.green:t.sig.includes("🔴")?C.red:t.sig.includes("🟠")?C.orange:t.sig.includes("🟡")?C.yellow:C.muted;
  const cc=t.conf>=7?C.green:t.conf>=5?C.yellow:C.muted;
  return <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:14,borderLeft:`4px solid ${sc}`}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6,marginBottom:6}}>
      <div style={{display:"flex",alignItems:"center",gap:7}}>
        <span style={{fontSize:19,fontWeight:800}}>{sym}</span>
        <span style={{fontSize:11,color:C.muted}}>{t.price}</span>
        <span style={{fontSize:11,padding:"2px 8px",borderRadius:14,background:sc+"20",color:sc,fontWeight:700}}>{t.sig} {t.label}</span>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:4}}>
        <span style={{fontSize:9,color:C.muted}}>置信度</span>
        <span style={{fontSize:17,fontWeight:800,color:cc}}>{t.conf}</span>
        <span style={{fontSize:9,color:C.muted}}>/10 · {t.total}</span>
      </div>
    </div>
    <div style={{display:"flex",gap:10,marginBottom:6,alignItems:"center",flexWrap:"wrap"}}>
      <span style={{fontSize:10.5}}><span style={{color:C.green,fontWeight:700}}>看多{t.bull}</span>{" vs "}<span style={{color:C.red,fontWeight:700}}>看空{t.bear}</span></span>
      <div style={{display:"flex",height:6,borderRadius:3,overflow:"hidden",background:C.redDim,flex:1,minWidth:60,maxWidth:160}}>
        <div style={{width:`${t.bp}%`,background:C.green,borderRadius:"3px 0 0 3px"}}/>
      </div>
    </div>
    <CTable rows={t.contracts}/>
    <p style={{fontSize:10.5,lineHeight:1.6,margin:"0 0 3px"}}><span style={{color:C.blue,fontWeight:700}}>动机解读：</span>{t.reason}</p>
    <p style={{fontSize:10.5,lineHeight:1.6,margin:0}}><span style={{color:C.purple,fontWeight:700}}>催化剂关联：</span>{t.catalyst}</p>
  </div>;
}
