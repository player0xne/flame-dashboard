function BarMini({ bull, bear }) {
  const b = parseFloat(bull.replace(/[^0-9.]/g, ""));
  const s = parseFloat(bear.replace(/[^0-9.]/g, ""));
  const total = b + s || 1;
  const bp = (b / total) * 100;
  return (
    <div style={{ display: "flex", height: 8, borderRadius: 4, overflow: "hidden", background: COLORS.redDim, width: "100%" }}>
      <div style={{ width: `${bp}%`, background: COLORS.green, borderRadius: "4px 0 0 4px" }} />
    </div>
  );
}

function MacroBar() {
  const items = [
    { label: "SPX", val: macroData.spx.val, chg: macroData.spx.chg, up: true },
    { label: "QQQ", val: macroData.qqq.val, chg: macroData.qqq.chg, up: true },
    { label: "VIX", val: macroData.vix.val, chg: macroData.vix.chg, up: false },
    { label: "WTI Oil", val: macroData.oil.val, chg: macroData.oil.chg, up: false },
    { label: "Gold", val: macroData.gold.val, chg: macroData.gold.chg, up: false },
  ];
  return (
    <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 8 }}>
      {items.map((it) => (
        <div key={it.label} style={{ padding: "6px 14px", background: COLORS.cardAlt, borderRadius: 8, border: `1px solid ${COLORS.border}`, minWidth: 120 }}>
          <div style={{ fontSize: 11, color: COLORS.textMuted, marginBottom: 2 }}>{it.label}</div>
          <div style={{ fontSize: 15, fontWeight: 700, color: COLORS.text }}>{it.val}</div>
          <div style={{ fontSize: 12, color: it.up ? COLORS.green : COLORS.red, fontWeight: 600 }}>{it.chg}</div>
        </div>
      ))}
    </div>
  );
}

    <div style={{ background: COLORS.card, border: `1px solid ${COLORS.border}`, borderRadius: 12, padding: 18, marginBottom: 14, borderLeft: `4px solid ${sigColor}` }}>

          <span style={{ fontSize: 12, color: COLORS.textMuted }}>置信度</span>
          <span style={{ fontSize: 20, fontWeight: 800, color: sigColor }}>{t.confidence}</span>

        </div>
      </div>
      <div style={{ display: "flex", gap: 16, marginBottom: 10, alignItems: "center", flexWrap: "wrap" }}>
        <div style={{ fontSize: 12 }}>
          <span style={{ color: COLORS.green, fontWeight: 700 }}>看多 {t.netBull}</span>
          <span style={{ color: COLORS.textMuted, margin: "0 6px" }}>vs</span>
          <span style={{ color: COLORS.red, fontWeight: 700 }}>看空 {t.netBear}</span>
        </div>
        <div style={{ flex: 1, minWidth: 100, maxWidth: 200 }}><BarMini bull={t.netBull} bear={t.netBear} /></div>
      </div>
      <div style={{ overflowX: "auto", marginBottom: 10 }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
          <thead>
            <tr style={{ borderBottom: `1px solid ${COLORS.border}` }}>
              {["合约", "到期", "DTE", "方向", "主动", "金额", "V/OI"].map((h) => (
                <th key={h} style={{ padding: "4px 8px", color: COLORS.textMuted, fontWeight: 600, textAlign: "left", whiteSpace: "nowrap" }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {t.topContracts.map((c, i) => {
              const dc = c.dir.includes("🟢") ? COLORS.green : c.dir.includes("🔴") ? COLORS.red : c.dir.includes("🟡") ? COLORS.yellow : COLORS.textMuted;
              return (
                <tr key={i} style={{ borderBottom: `1px solid ${COLORS.border}20` }}>
                  <td style={{ padding: "4px 8px", color: COLORS.text, fontWeight: 700 }}>{c.strike}</td>
                  <td style={{ padding: "4px 8px", color: COLORS.textMuted }}>{c.exp}</td>
                  <td style={{ padding: "4px 8px", color: COLORS.textMuted }}>{c.dte}d</td>
                  <td style={{ padding: "4px 8px", color: dc, fontWeight: 600 }}>{c.dir}</td>
                  <td style={{ padding: "4px 8px", color: c.active === "买入" ? COLORS.green : c.active === "卖出" ? COLORS.red : COLORS.yellow }}>{c.active}</td>
                  <td style={{ padding: "4px 8px", color: COLORS.text, fontWeight: 700 }}>{c.vol}</td>
                  <td style={{ padding: "4px 8px", color: parseFloat(c.voi) > 5 ? COLORS.yellow : COLORS.textMuted, fontWeight: parseFloat(c.voi) > 5 ? 700 : 400 }}>{c.voi}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      <div style={{ fontSize: 12, color: COLORS.text, lineHeight: 1.6, marginBottom: 4 }}>
        <span style={{ color: COLORS.blue, fontWeight: 700 }}>动机解读：</span>{t.reason}

function StrategyTable() {
  return (
    <div style={{ overflowX: "auto" }}>

              <th key={h} style={{ padding: "8px 6px", color: COLORS.blue, fontWeight: 700, textAlign: "left", whiteSpace: "nowrap", fontSize: 11 }}>{h}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {strategies.map((s, i) => {
            const cc = s.conf >= 7 ? COLORS.green : s.conf >= 5 ? COLORS.yellow : COLORS.textMuted;
            return (
              <tr key={i} style={{ borderBottom: `1px solid ${COLORS.border}40`, background: i % 2 === 0 ? COLORS.card : COLORS.cardAlt }}>
                <td style={{ padding: "8px 6px", fontWeight: 800, color: COLORS.text, whiteSpace: "nowrap" }}>{s.sym}</td>
                <td style={{ padding: "8px 6px", color: COLORS.purple, fontWeight: 600, whiteSpace: "nowrap" }}>{s.type}</td>
                <td style={{ padding: "8px 6px", color: COLORS.text, fontWeight: 600, minWidth: 180 }}>{s.legs}</td>
                <td style={{ padding: "8px 6px", color: COLORS.textMuted, whiteSpace: "nowrap" }}>{s.entry}</td>
                <td style={{ padding: "8px 6px", color: COLORS.green, fontWeight: 600, whiteSpace: "nowrap" }}>{s.target}</td>
                <td style={{ padding: "8px 6px", color: COLORS.red, whiteSpace: "nowrap" }}>{s.stop}</td>

                <td style={{ padding: "8px 6px", color: COLORS.textMuted, whiteSpace: "nowrap" }}>{s.hold}</td>
                <td style={{ padding: "8px 6px" }}><span style={{ color: cc, fontWeight: 800, fontSize: 16 }}>{s.conf}</span></td>

              </tr>

        </tbody>
      </table>
    </div>
  );
}
