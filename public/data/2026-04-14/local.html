function ConfBadge({ v }) {
  const color = v >= 7 ? C.green : v >= 5 ? C.yellow : C.textMuted;
  return <span style={{ fontSize: 28, fontWeight: 900, color, fontFamily: "monospace" }}>{v}</span>;
}

function MiniBar({ bull, bear }) {
  const total = bull + bear;
  const bp = Math.round((bull / total) * 100);
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
      <span style={{ color: C.green, fontSize: 12, fontFamily: "monospace", minWidth: 30 }}>{bull}</span>
      <div style={{ flex: 1, height: 8, borderRadius: 4, background: C.border, display: "flex", overflow: "hidden" }}>
        <div style={{ width: `${bp}%`, background: C.green, borderRadius: "4px 0 0 4px" }} />
        <div style={{ width: `${100 - bp}%`, background: C.red, borderRadius: "0 4px 4px 0" }} />
      </div>
      <span style={{ color: C.red, fontSize: 12, fontFamily: "monospace", minWidth: 30, textAlign: "right" }}>{bear}</span>
    </div>
  );
}

function TickerCard({ sym }) {

  const labelColor = { "🟢": C.green, "🟡": C.yellow, "⚪": C.textMuted, "🟠": C.orange, "🔴": C.red }[d.label] || C.textMuted;
  return (
    <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 14, overflow: "hidden", marginBottom: 20 }}>
      <div style={{ display: "flex", borderLeft: `4px solid ${labelColor}` }}>
        <div style={{ flex: 1, padding: "16px 20px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 8, flexWrap: "wrap" }}>
            <span style={{ fontSize: 22, fontWeight: 800, fontFamily: "monospace", color: C.text }}>{sym}</span>
            <span style={{ background: labelColor + "22", color: labelColor, padding: "2px 10px", borderRadius: 6, fontSize: 13, fontWeight: 600 }}>{d.label} {d.labelText}</span>
            <span style={{ color: C.textMuted, fontSize: 13 }}>收盘 <b style={{ color: C.text }}>${closePrices[sym]}</b></span>
            <span style={{ color: C.textMuted, fontSize: 13 }}>MaxPain <b style={{ color: C.yellow }}>{d.maxPain}</b></span>
            {d.gammaRisk === "HIGH" && <span style={{ background: C.redDim, color: C.red, padding: "2px 8px", borderRadius: 6, fontSize: 11 }}>⚠️ Gamma Squeeze</span>}

        </div>
      </div>
      <div style={{ overflowX: "auto" }}>

          <thead><tr style={{ background: C.cardAlt }}>
