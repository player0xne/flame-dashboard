function ConfBadge({ v }) {
  const color = v >= 7 ? C.green : v >= 5 ? C.yellow : C.textMuted;
  return <span style={{ fontSize: 26, fontWeight: 900, color, fontFamily: "monospace" }}>{v}</span>;
}

function MiniBar({ bull, bear }) {
  const total = bull + bear;
  const bp = Math.round((bull / total) * 100);
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
      <span style={{ color: C.green, fontSize: 12, fontFamily: "monospace", minWidth: 28 }}>{bull}</span>
      <div style={{ flex: 1, height: 8, borderRadius: 4, background: C.border, display: "flex", overflow: "hidden" }}>
        <div style={{ width: `${bp}%`, background: C.green, borderRadius: "4px 0 0 4px" }} />
        <div style={{ width: `${100 - bp}%`, background: C.red, borderRadius: "0 4px 4px 0" }} />
      </div>
      <span style={{ color: C.red, fontSize: 12, fontFamily: "monospace", minWidth: 28, textAlign: "right" }}>{bear}</span>
    </div>
  );
}

function PriceChip({ sym }) {
  const chg = pctChg(sym);
  if (chg === null) return null;
  const up = parseFloat(chg) >= 0;
  return (
    <span style={{ color: up ? C.green : C.red, fontSize: 12, fontWeight: 700, fontFamily: "monospace" }}>
      {up ? "▲" : "▼"}{Math.abs(chg)}%
    </span>
  );
}
