<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 24px; background: #fff; color: #1a1a2e; }
    h1 { color: #10b981; font-size: 1.5rem; border-bottom: 2px solid #10b981; padding-bottom: 8px; }
    h2 { color: #374151; font-size: 1.1rem; margin-top: 20px; }
    table { width: 100%; border-collapse: collapse; margin: 12px 0; }
    th { background: #d1fae5; color: #065f46; padding: 8px 12px; text-align: left; font-size: 0.85rem; }
    td { padding: 8px 12px; border-bottom: 1px solid #e5e7eb; font-size: 0.85rem; }
    tr:hover { background: #ecfdf5; }
    .match { color: #059669; font-weight: 600; }
    .diff { color: #dc2626; font-weight: 600; }
  </style>
</head>
<body>
  <h1>两系统对比分析 - 2026-04-07</h1>
  <h2>共同发现的异动标的</h2>
  <table>
    <tr><th>标的</th><th>Moomoo信号</th><th>本地信号</th><th>一致性</th></tr>
    <tr><td>AAPL</td><td>Call量异动 3.2x OI</td><td>大单买入Call 得分87</td><td class="match">一致 - 看涨</td></tr>
    <tr><td>TSLA</td><td>Call量异动 4.1x OI</td><td>连续买入Call 得分82</td><td class="match">一致 - 看涨</td></tr>
  </table>
  <h2>仅Moomoo发现</h2>
  <table>
    <tr><th>标的</th><th>信号</th><th>可能原因</th></tr>
    <tr><td>NVDA</td><td>Call量异动</td><td>本地系统筛选阈值较高</td></tr>
    <tr><td>SPY/QQQ Put</td><td>Put量异动</td><td>本地系统未跟踪ETF期权</td></tr>
  </table>
  <h2>仅本地系统发现</h2>
  <table>
    <tr><th>标的</th><th>信号</th><th>可能原因</th></tr>
    <tr><td>META</td><td>异常Put量</td><td>Moomoo未标记为异动</td></tr>
    <tr><td>AMZN</td><td>价差策略</td><td>Moomoo不追踪复合策略</td></tr>
  </table>
  <p style="color:#6b7280;font-size:0.8rem;margin-top:24px;">示例数据 - 系统对比分析</p>
</body>
</html>
