<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 24px; background: #fff; color: #1a1a2e; }
    h1 { color: #3b82f6; font-size: 1.5rem; border-bottom: 2px solid #3b82f6; padding-bottom: 8px; }
    h2 { color: #374151; font-size: 1.1rem; margin-top: 20px; }
    table { width: 100%; border-collapse: collapse; margin: 12px 0; }
    th { background: #dbeafe; color: #1e40af; padding: 8px 12px; text-align: left; font-size: 0.85rem; }
    td { padding: 8px 12px; border-bottom: 1px solid #e5e7eb; font-size: 0.85rem; }
    tr:hover { background: #eff6ff; }
    .signal { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
    .strong { background: #dcfce7; color: #166534; }
    .medium { background: #fef9c3; color: #854d0e; }
  </style>
</head>
<body>
  <h1>本地异动追踪系统 - 2026-04-07</h1>
  <h2>异动信号汇总</h2>
  <table>
    <tr><th>标的</th><th>信号类型</th><th>异动得分</th><th>成交量/均值</th><th>强度</th></tr>
    <tr><td>AAPL</td><td>大单买入Call</td><td>87</td><td>4.2x</td><td><span class="signal strong">强</span></td></tr>
    <tr><td>TSLA</td><td>连续买入Call</td><td>82</td><td>3.8x</td><td><span class="signal strong">强</span></td></tr>
    <tr><td>META</td><td>异常Put量</td><td>71</td><td>2.9x</td><td><span class="signal medium">中</span></td></tr>
    <tr><td>AMZN</td><td>价差策略</td><td>65</td><td>2.1x</td><td><span class="signal medium">中</span></td></tr>
  </table>
  <p style="color:#6b7280;font-size:0.8rem;margin-top:24px;">示例数据 - 本地追踪系统分析</p>
</body>
</html>
